name: Release Build

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux
          - os: windows-latest
            platform: windows
          - os: macos-14
            platform: macos

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install System Dependencies (Ubuntu)
        if: matrix.platform == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg libimage-exiftool-perl
          # Libraries for PySide6/Qt
          sudo apt-get install -y libegl1 libopengl0 libxcb-cursor0 libxcb-icccm4 libxcb-image0 libxcb-keysyms1 libxcb-randr0 libxcb-render-util0 libxcb-shape0 libxcb-shm0 libxcb-util1 libxcb-xfixes0 libxcb-xinerama0 libxcb-xkb1 libxkbcommon-x11-0

      - name: Install System Dependencies (macOS)
        if: matrix.platform == 'macos'
        run: |
          brew install ffmpeg exiftool

      - name: Install System Dependencies (Windows)
        if: matrix.platform == 'windows'
        run: |
          choco install ffmpeg exiftool

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Determine Revision
        id: rev
        shell: bash
        run: |
          if [[ $GITHUB_REF == refs/tags/* ]]; then
            echo "REVISION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
          else
            echo "REVISION=dev-${GITHUB_SHA::7}" >> $GITHUB_OUTPUT
          fi

      - name: Build with build.py
        run: |
          python build.py --revision ${{ steps.rev.outputs.REVISION }}

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: uwmedia-${{ matrix.platform }}
          path: dist/*

  release:
    name: Create Release
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/uwmedia-linux/*
            artifacts/uwmedia-windows/*
            artifacts/uwmedia-macos/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
